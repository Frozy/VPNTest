<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanyVPN</title>
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .subtitle { opacity: 0.9; margin-bottom: 30px; }
        .btn {
            background: white;
            color: #667eea;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔐 DanyVPN</h1>
        <div class="subtitle">Admin Panel</div>
        <p>Это панель управления. Для подключения используйте ссылку подписки в VPN клиенте.</p>        <a href="javascript:copyLink()" class="btn">📋 Скопировать ссылку подписки</a>
    </div>

    <script>
        // =========================================================================
        // ПРОВЕРКА: если зашёл VPN клиент (Happ, v2rayNG и т.д.)
        // =========================================================================
        
        const ua = navigator.userAgent.toLowerCase();
        const isVpnApp = ua.includes('v2ray') || 
                        ua.includes('shadowrocket') || 
                        ua.includes('streisand') ||
                        ua.includes('hiddify') ||
                        ua.includes('sing-box') ||
                        ua.includes('nekobox') ||
                        ua.includes('happproxy') ||
                        window.location.href.includes('raw');

        if (isVpnApp) {
            // =========================================================================
            // ФОРМИРУЕМ ПОДПИСКУ С ПРАВИЛЬНЫМИ ЗАГОЛОВКАМИ
            // =========================================================================
            
            // Заголовки подписки (должны быть в первых строках!)
            const headers = [
                "#profile-title: DanyVPN",
                "#subscription-userinfo: upload=0; download=0; total=0; expire=0",
                "#",
                "# 👑 DanyVPN Admin Version",
                "# 🕵️ Выдано владельцем подписки",
                "# ↓ Сервера",
                "#"
            ];
            
            // Серверы (пустышки для тестирования)
            const servers = [
                "vless://00000000-0000-0000-0000-000000000000@127.0.0.1:1230?encryption=none&security=none&type=tcp#ℹ️+DanyVPN+Admin+Version",
                "vless://00000000-0000-0000-0000-000000000001@127.0.0.1:1231?encryption=none&security=none&type=tcp#🕵️+Выдано+владельцем+подписки",
                "vless://00000000-0000-0000-0000-000000000002@127.0.0.1:1232?encryption=none&security=none&type=tcp#↓+Сервера",
                "vless://00000000-0000-0000-0000-000000000003@127.0.0.1:1233?encryption=none&security=none&type=tcp#🇩+ADMIN+|+Germany+(Plus)",
                "vless://00000000-0000-0000-0000-000000000004@127.0.0.1:1234?encryption=none&security=none&type=tcp#🇺+ADMIN+|+USA+(Plus)",
                "vless://00000000-0000-0000-0000-000000000005@127.0.0.1:1235?encryption=none&security=none&type=tcp#🇳🇱+ADMIN+|+Netherlands+(Plus)"
            ];
            
            // Объединяем заголовки и серверы
            const subscriptionText = [...headers, ...servers].join('\n');
            
            // Кодируем в base64
            const base64 = btoa(unescape(encodeURIComponent(subscriptionText)));
                        // Показываем только base64 для VPN клиентов
            document.body.innerHTML = '<pre style="white-space: pre-wrap; word-break: break-all; padding: 20px; font-size: 12px;">' + base64 + '</pre>';
            document.body.style.background = 'white';
            document.body.style.color = 'black';
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('✅ Ссылка скопирована!\nВставьте её в Happ/v2rayNG в раздел "Подписки"');
        }
    </script>

</body>
</html>
